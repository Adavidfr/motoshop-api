                $ref: '#/components/schemas/TokenVerify'
          description: ''
  /api/carritos/:
    get:
      operationId: carritos_list
      description: |-
        ViewSet CRUD de carrito_compras (tabla: carrito_compras).



        Clientes: CRUD de carrito propio, add-item, vaciar y remove-item.

        Administradores: solo lectura (consulta/revisión).
      parameters:
      - name: limit
        required: false
        in: query
        description: Number of results to return per page.
        schema:
          type: integer
      - name: ordering
        required: false
        in: query
        description: Which field to use when ordering the results.
        schema:
          type: string
      - name: page
        required: false
        in: query
        description: A page number within the paginated result set.
        schema:
          type: integer
      tags:
      - carritos
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedCarritoComprasList'
          description: ''
    post:
      operationId: carritos_create
      description: |-
        ViewSet CRUD de carrito_compras (tabla: carrito_compras).



