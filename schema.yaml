        PATCH  /clientes/perfil/  → Actualizar parcialmente el perfil del cliente autenticado
        DELETE /clientes/perfil/  → Eliminar el perfil del cliente autenticado
      tags:
      - clientes
      security:
      - jwtAuth: []
      responses:
        '200':
          description: No response body
    post:
