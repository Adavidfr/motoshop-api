          items:
            $ref: '#/components/schemas/Financiamiento'
          readOnly: true
      required:
      - fecha_venta
      - financiamientos
      - id_pedido
      - id_usuario_cliente
      - id_usuario_vendedor
      - id_venta
      - num_financiamientos
      - procesado_por
      - saldo_pendiente
      - total_pagado
      - total_venta
      - username_cliente
      - username_vendedor
    VentaCreate:
      type: object
      description: |-
        Serializer para registrar una venta desde un pedido confirmado.

        Body: { "id_pedido": 1, "estado": "pendiente" }

        El total se calcula en backend; total_venta del frontend se ignora.
      properties:
        id_pedido:
          type: integer
        estado:
          $ref: '#/components/schemas/Estado59dEnum'
      required:
      - id_pedido
    VentaDetail:
      type: object
      description: Serializer de ventas con nombres exactos del esquema SQL.
      properties:
        id_venta:
          type: integer
          readOnly: true
        id_pedido:
          type: integer
        username_cliente:
          type: string
          readOnly: true
        id_usuario_cliente:
          type: integer
          readOnly: true
        username_vendedor:
          type: string
          readOnly: true
        id_usuario_vendedor:
          type: integer
          readOnly: true
        procesado_por:
          type: string
          readOnly: true
        total_venta:
          type: string
          format: decimal
          pattern: ^-?\d{0,10}(?:\.\d{0,2})?$
          readOnly: true
        total_pagado:
          type: string
          readOnly: true
        saldo_pendiente:
          type: string
          readOnly: true
        estado:
          $ref: '#/components/schemas/Estado59dEnum'
        fecha_venta:
          type: string
          format: date-time
          readOnly: true
        num_financiamientos:
          type: string
          readOnly: true
        financiamientos:
          type: array
          items:
            $ref: '#/components/schemas/Financiamiento'
          readOnly: true
        pedido:
          allOf:
          - $ref: '#/components/schemas/Pedido'
          readOnly: true
        pagos:
          type: array
          items:
            $ref: '#/components/schemas/Pago'
          readOnly: true
        financiamiento:
          type: string
          readOnly: true
        factura:
          allOf:
          - $ref: '#/components/schemas/Factura'
          readOnly: true
      required:
      - factura
      - fecha_venta
      - financiamiento
      - financiamientos
      - id_pedido
      - id_usuario_cliente
      - id_usuario_vendedor
      - id_venta
      - num_financiamientos
      - pagos
      - pedido
      - procesado_por
      - saldo_pendiente
      - total_pagado
      - total_venta
      - username_cliente
      - username_vendedor
