  /api/financiamientos/:
    get:
      operationId: financiamientos_list
      description: |-
        ViewSet CRUD de financiamientos.
        Solo accesible para staff/admin.

        Endpoints generados:
          GET    /financiamientos/              → listar todos
          POST   /financiamientos/              → crear
          GET    /financiamientos/<id>/         → detalle
          PATCH  /financiamientos/<id>/         → editar
          DELETE /financiamientos/<id>/         → eliminar

        Filtros disponibles:
          ?estado=activo
          ?id_venta=<id>
          ?entidad_financiera=<nombre>
          ?monto_min=<valor>
          ?monto_max=<valor>

        Acciones custom:
          GET  /financiamientos/stats/          → estadísticas globales
      parameters:
      - in: query
        name: entidad_financiera
        schema:
          type: string
      - in: query
        name: estado
        schema:
          type: string
          enum:
          - activo
          - cancelado
          - pagado
          - vencido
        description: |-
          * `activo` - Activo
          * `pagado` - Pagado
          * `vencido` - Vencido
          * `cancelado` - Cancelado
      - in: query
        name: id_venta
        schema:
          type: integer
      - name: limit
        required: false
        in: query
        description: Number of results to return per page.
        schema:
          type: integer
      - in: query
        name: monto_max
        schema:
          type: number
      - in: query
        name: monto_min
        schema:
          type: number
      - name: ordering
        required: false
        in: query
        description: Which field to use when ordering the results.
        schema:
          type: string
      - name: page
        required: false
        in: query
        description: A page number within the paginated result set.
        schema:
          type: integer
      - name: search
        required: false
        in: query
        description: A search term.
        schema:
          type: string
      tags:
      - financiamientos
      security:
      - jwtAuth: []
