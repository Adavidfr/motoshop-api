components:
  schemas:
    CarritoCompras:
      type: object
      description: Serializer de carrito_compras con nombres exactos del esquema SQL.
      properties:
        id_carrito:
          type: integer
          readOnly: true
        username_cliente:
          type: string
          readOnly: true
        id_usuario_cliente:
          type: integer
          readOnly: true
        estado:
          $ref: '#/components/schemas/CarritoComprasEstadoEnum'
        fecha_creacion:
          type: string
          format: date-time
          readOnly: true
        num_items:
          type: string
          readOnly: true
        total:
          type: string
          readOnly: true
        items:
          type: array
          items:
            $ref: '#/components/schemas/ItemCarrito'
          readOnly: true
      required:
      - fecha_creacion
      - id_carrito
      - id_usuario_cliente
      - items
      - num_items
      - total
      - username_cliente
    CarritoComprasEstadoEnum:
      enum:
      - activo
      - procesado
      - abandonado
      type: string
      description: |-
        * `activo` - Activo
        * `procesado` - Procesado
        * `abandonado` - Abandonado
    CategoriaMoto:
      type: object
      properties:
        id_categoria:
          type: integer
          readOnly: true
        nombre:
          type: string
          maxLength: 100
        descripcion:
          type: string
          nullable: true
        estado:
          type: boolean
      required:
      - id_categoria
      - nombre
    ClientePerfil:
      type: object
      description: Serializer de clientes_perfil con nombres exactos del esquema SQL.
      properties:
        id_perfil:
          type: integer
          readOnly: true
        username:
          type: string
          readOnly: true
        email:
          type: string
          readOnly: true
        cedula:
          type: string
          maxLength: 20
        telefono:
          type: string
          maxLength: 20
        direccion:
          type: string
        foto_perfil:
          type: string
          format: uri
          nullable: true
        fecha_nacimiento:
          type: string
          format: date
          nullable: true
      required:
      - email
      - id_perfil
      - username
    Compra:
      type: object
      properties:
        id_compra:
          type: integer
          readOnly: true
        proveedor:
          type: integer
        moto:
          type: integer
          nullable: true
        repuesto:
          type: integer
          nullable: true
        cantidad:
          type: integer
          maximum: 2147483647
          minimum: 0
        precio_unitario:
          type: string
          format: decimal
          pattern: ^-?\d{0,10}(?:\.\d{0,2})?$
        subtotal:
          type: string
          format: decimal
          pattern: ^-?\d{0,10}(?:\.\d{0,2})?$
        fecha_compra:
          type: string
          format: date-time
          readOnly: true
        estado:
          $ref: '#/components/schemas/CompraEstadoEnum'
        stock_aplicado:
          type: boolean
          readOnly: true
      required:
      - cantidad
      - fecha_compra
      - id_compra
      - precio_unitario
      - proveedor
      - stock_aplicado
      - subtotal
    CompraEstadoEnum:
      enum:
      - Pendiente
      - Recibida
      - Cancelada
      type: string
      description: |-
        * `Pendiente` - Pendiente
        * `Recibida` - Recibida
        * `Cancelada` - Cancelada
    CustomToken:
      type: object
      properties:
        username:
          type: string
          writeOnly: true
        password:
          type: string
          writeOnly: true
      required:
      - password
      - username
    Devolucion:
      type: object
      description: Serializer de devoluciones con nombres exactos del esquema SQL.
      properties:
        id_devolucion:
          type: integer
          readOnly: true
        id_venta:
          type: integer
        motivo:
          type: string
        estado:
          $ref: '#/components/schemas/DevolucionEstadoEnum'
        monto_devolucion:
          type: string
          format: decimal
          pattern: ^-?\d{0,10}(?:\.\d{0,2})?$
        monto_reembolso_aplicado:
          type: string
          format: decimal
          pattern: ^-?\d{0,10}(?:\.\d{0,2})?$
          readOnly: true
          description: Monto reembolsado al aprobar (0 si no hubo pagos).
        stock_reintegrado:
          type: boolean
          readOnly: true
        fecha_solicitud:
          type: string
          format: date-time
          readOnly: true
        fecha_resolucion:
          type: string
          format: date-time
          nullable: true
      required:
      - fecha_solicitud
      - id_devolucion
      - id_venta
      - monto_devolucion
      - monto_reembolso_aplicado
      - motivo
      - stock_reintegrado
    DevolucionCreate:
      type: object
      description: |-
        Solicitud de devolución total (sin líneas de detalle).

        monto_devolucion = reembolso solicitado; use 0 para devolución física sin dinero.
      properties:
        id_venta:
          type: integer
        motivo:
          type: string
        monto_devolucion:
          type: string
          format: decimal
          pattern: ^-?\d{0,10}(?:\.\d{0,2})?$
      required:
      - id_venta
      - monto_devolucion
      - motivo
    DevolucionEstadoEnum:
      enum:
      - solicitada
      - aprobada
      - rechazada
      - completada
      type: string
      description: |-
        * `solicitada` - Solicitada
        * `aprobada` - Aprobada
        * `rechazada` - Rechazada
        * `completada` - Completada
    DocumentoVenta:
      type: object
      description: |-
        Serializer de documentos de venta.

        archivo_url_legacy: solo lectura; plan de retiro documentado en DocumentoVentaService.
      properties:
        id_documento:
          type: integer
          readOnly: true
        id_venta:
          type: integer
          readOnly: true
        tipo_documento:
          allOf:
          - $ref: '#/components/schemas/TipoDocumentoEnum'
          readOnly: true
        archivo_url:
          type: string
          readOnly: true
        archivo_url_legacy:
          type: string
          readOnly: true
        nombre_original:
          type: string
          readOnly: true
        tamano_bytes:
          type: integer
          readOnly: true
          nullable: true
        content_type:
          type: string
          readOnly: true
        subido_por:
          type: integer
          readOnly: true
          nullable: true
        subido_por_info:
          type: string
          readOnly: true
        fecha_subida:
          type: string
          format: date-time
          readOnly: true
      required:
      - archivo_url
      - archivo_url_legacy
      - content_type
      - fecha_subida
      - id_documento
      - id_venta
      - nombre_original
      - subido_por
      - subido_por_info
      - tamano_bytes
      - tipo_documento
    DocumentoVentaCreate:
      type: object
      description: Subida multipart de documento. archivo es obligatorio para documentos
        nuevos.
      properties:
        id_venta:
          type: integer
        tipo_documento:
          $ref: '#/components/schemas/TipoDocumentoEnum'
        archivo:
          type: string
          format: uri
      required:
      - archivo
      - id_venta
      - tipo_documento
    Estado59dEnum:
      enum:
      - pendiente
      - completada
      - anulada
      type: string
      description: |-
        * `pendiente` - Pendiente
        * `completada` - Completada
        * `anulada` - Anulada
    Estado5abEnum:
      enum:
      - activo
      - pagado
      - vencido
      - cancelado
      type: string
      description: |-
        * `activo` - Activo
        * `pagado` - Pagado
        * `vencido` - Vencido
        * `cancelado` - Cancelado
    Estado908Enum:
      enum:
      - pendiente
      - completado
      - fallido
      - reembolsado
      type: string
      description: |-
        * `pendiente` - Pendiente
        * `completado` - Completado
        * `fallido` - Fallido
        * `reembolsado` - Reembolsado
    EstadoB61Enum:
      enum:
      - activa
      - vencida
      - anulada
      type: string
      description: |-
        * `activa` - Activa
        * `vencida` - Vencida
        * `anulada` - Anulada
    EstadoC59Enum:
      enum:
      - activo
      - vencido
      - cancelado
      type: string
      description: |-
        * `activo` - Activo
        * `vencido` - Vencido
        * `cancelado` - Cancelado
    Factura:
      type: object
      description: Serializer de facturas con nombres exactos del esquema SQL.
      properties:
        id_factura:
          type: integer
          readOnly: true
        id_venta:
          type: integer
        numero_factura:
          type: string
          maxLength: 50
        fecha_emision:
          type: string
          format: date-time
          readOnly: true
        subtotal:
          type: string
          format: decimal
          pattern: ^-?\d{0,10}(?:\.\d{0,2})?$
          readOnly: true
        iva:
          type: string
          format: decimal
          pattern: ^-?\d{0,10}(?:\.\d{0,2})?$
          readOnly: true
        total:
          type: string
          format: decimal
          pattern: ^-?\d{0,10}(?:\.\d{0,2})?$
          readOnly: true
      required:
      - fecha_emision
      - id_factura
      - id_venta
      - iva
      - numero_factura
      - subtotal
      - total
    FacturaCreate:
      type: object
      description: Serializer para emitir una factura. Totales calculados en backend.
      properties:
        id_venta:
          type: integer
        numero_factura:
          type: string
          maxLength: 50
      required:
      - id_venta
      - numero_factura
    Financiamiento:
      type: object
      description: Serializer de financiamientos con nombres exactos del esquema SQL.
      properties:
        id_financiamiento:
          type: integer
          readOnly: true
        id_venta:
          type: integer
        entidad_financiera:
          type: string
          maxLength: 100
        monto_financiado:
